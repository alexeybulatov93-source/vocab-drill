,{"cat":"Adverbs","word":"vehemently","tr":"яростно / горячо / настойчиво","ph":"/ˈviːɪməntli/","v2":"","v3":"","ex":"She vehemently opposed any cuts to the welfare budget.","exr":"Она яростно выступала против любых сокращений бюджета социального обеспечения."},{"cat":"Adverbs","word":"vigorously","tr":"энергично / активно / настойчиво","ph":"/ˈvɪɡərəsli/","v2":"","v3":"","ex":"The company vigorously contested the court ruling.","exr":"Компания энергично оспорила решение суда."},{"cat":"Adverbs","word":"whereby","tr":"посредством чего / в соответствии с которым","ph":"/ˌweəˈbaɪ/","v2":"","v3":"","ex":"A new system was introduced whereby all expenses require approval.","exr":"Была введена новая система, в соответствии с которой все расходы требуют одобрения."},{"cat":"Adverbs","word":"widely","tr":"широко / повсеместно","ph":"/ˈwaɪdli/","v2":"","v3":"","ex":"The technique is now widely used in clinical practice.","exr":"В настоящее время этот метод широко применяется в клинической практике."},{"cat":"Phrasal Verbs","word":"throw away","tr":"выбросить, избавиться навсегда","ph":"","v2":"threw away","v3":"thrown away","ex":"I threw away the old newspapers. Я выбросил старые газеты (в мусор, они мне больше не нужны) / Don't throw away your chance! Не упусти свой шанс! (переносное – \"выбросить\" из жизни","exr":""},{"cat":"Phrasal Verbs","word":"throw out","tr":"выкинуть вон, удалить из пространства","ph":"","v2":"threw out","v3":"thrown out","ex":"Throw out the cat! (Выгони кота из дома!) / He was thrown out of the club. (Его вышвырнули из клуба.) / Throw out that old chair. (Выкинь этот старый стул из квартиры.)","exr":""},{"cat":"Phrasal Verbs","word":"throw off","tr":"сбросить (с себя); избавиться; сбить со следа","ph":"","v2":"threw off","v3":"thrown off","ex":"He threw off the blanket. (Он сбросил одеяло.) / The criminal threw off the police. (Преступник оторвался от полиции.) / I can't throw off this cold. (Не могу избавиться от простуд","exr":""},{"cat":"Phrasal Verbs","word":"throw up","tr":"вырвать, стошнить; бросить (работу, дело); быстро построить","ph":"","v2":"threw up","v3":"thrown up","ex":"He threw up after the ride. (Его вырвало после аттракциона.) / She threw up her job. (Она бросила работу.) / They threw up a wall overnight. (Они быстро возвели стену за ночь.)","exr":""},{"cat":"Phrasal Verbs","word":"throw together","tr":"быстро собрать, состряпать (еду, план); свести людей случайно","ph":"","v2":"threw together","v3":"thrown together","ex":"I threw together a quick dinner. (Я быстро состряпал ужин.) / They were thrown together by fate. (Их свела судьба.)","exr":""},{"cat":"Phrasal Verbs","word":"throw over","tr":"бросить, отказаться (от отношений, планов)","ph":"","v2":"threw over","v3":"thrown over","ex":"He threw over his girlfriend. (Он бросил свою девушку.) / She threw over the old plan. (Она отказалась от старого плана.)","exr":""},{"cat":"Phrasal Verbs","word":"throw back","tr":"отбросить назад; откинуть (волосы, одеяло); напомнить прошлое","ph":"","v2":"threw back","v3":"thrown back","ex":"She threw back her hair. (Она откинула волосы назад.) / The army threw back the attack. (Армия отбила атаку.) / It threw me back to my childhood. (Это вернуло меня в детство.)","exr":""},{"cat":"Phrasal Verbs","word":"throw in","tr":"бросить внутрь; добавить в довесок; вмешаться (в разговор)","ph":"","v2":"threw in","v3":"thrown in","ex":"He threw in a free gift. (Он добавил подарок в довесок.) / She threw in a comment. (Она вставила комментарий.) / Throw the ball in the box. (Брось мяч в коробку.)","exr":""},{"cat":"Phrasal Verbs","word":"throw on","tr":"накинуть (одежду)","ph":"","v2":"threw on","v3":"thrown on","ex":"I threw on a jacket and ran out. (Я накинул куртку и выбежал.)","exr":""},{"cat":"Phrasal Verbs","word":"throw at","tr":"бросить в кого-то (с целью попасть)","ph":"","v2":"threw at","v3":"thrown at","ex":"He threw a stone at the dog. (Он бросил камень в собаку.) / Don't throw accusations at me! (Не бросай в меня обвинения!)","exr":""},{"cat":"Phrasal Verbs","word":"throw to","tr":"бросить кому-то (чтобы поймали)","ph":"","v2":"threw to","v3":"thrown to","ex":"Throw the ball to me! (Брось мяч мне!) / He threw the keys to his friend. (Он бросил ключи другу.)","exr":""},{"cat":"Phrasal Verbs","word":"throw into","tr":"бросить внутрь; ввергнуть в состояние","ph":"","v2":"threw into","v3":"thrown into","ex":"She threw the letter into the fire. (Она бросила письмо в огонь.) / He was thrown into prison. (Его бросили в тюрьму.) / The news threw her into despair. (Новость ввергла её в отча","exr":""},{"cat":"Phrasal Verbs","word":"throw open","tr":"распахнуть (двери, окна); открыть для доступа","ph":"","v2":"threw open","v3":"thrown open","ex":"She threw open the windows. (Она распахнула окна.) / The competition was thrown open to everyone. (Конкурс открыли для всех.)","exr":""},{"cat":"Phrasal Verbs","word":"sleep off","tr":"проспаться, отоспаться (после перебора – алкоголь, усталость, болезнь)","ph":"","v2":"slept off","v3":"slept off","ex":"He had too much wine and slept it off. (Он перебрал вина и проспался.) / Give me a few hours to sleep off this headache. (Дай мне пару часов поспать, чтобы прошла голова.)","exr":""},{"cat":"Phrasal Verbs","word":"sleep in","tr":"отоспаться, спать дольше обычного (утром)","ph":"","v2":"slept in","v3":"slept in","ex":"I didn't work on Sunday, so I slept in. (Я не работал в воскресенье, поэтому отоспался.) / Don't wake me up – I want to sleep in! (Не буди – я хочу поспать подольше!)","exr":""},{"cat":"Phrasal Verbs","word":"sleep on it","tr":"переспать с решением, подумать до утра","ph":"","v2":"slept on","v3":"slept on","ex":"I'm not sure about the job offer – I'll sleep on it. (Я не уверен насчет предложения – пересплю с этим.)","exr":""},{"cat":"Phrasal Verbs","word":"sleep through","tr":"проспать (не услышать, не проснуться)","ph":"","v2":"slept through","v3":"slept through","ex":"She slept through the alarm. (Она проспала будильник.) / The baby slept through the storm. (Ребенок проспал всю грозу.)","exr":""},{"cat":"Phrasal Verbs","word":"sleep over","tr":"остаться на ночь (в гостях)","ph":"","v2":"slept over","v3":"slept over","ex":"Can I sleep over at my friend's house? (Можно я останусь ночевать у друга?) / We slept over after the party. (Мы остались с ночевкой после вечеринки.)","exr":""},{"cat":"Phrasal Verbs","word":"sleep together","tr":"спать вместе (в одной постели); переспать (о сексе)","ph":"","v2":"slept together","v3":"slept together","ex":"They slept together in the same bed. (Они спали вместе в одной кровати.) / Rumor has it they slept together. (Слухи говорят, что они переспали.)","exr":""},{"cat":"Phrasal Verbs","word":"sleep around","tr":"спать с кем попало, вести беспорядочную половую жизнь","ph":"","v2":"slept around","v3":"slept around","ex":"He's known for sleeping around. (Он известен тем, что спит со всеми подряд.)","exr":""}];
const GRAM_DATA = [{"title":"1. СТРОЕНИЕ ПРЕДЛОЖЕНИЯ (Sentence Structure)","rows":[{"type":"tip","text":"💡  Члены предложения. Подлежащее (Subject) = о ком/чём речь, кто делает. Сказуемое (Verb) = что делает. Дополнение (Object) = на кого/что направлено действие. Обстоятельство (Adverbial) = где, когда, как. Пример: She [S] reads [V] books [O] every morning [Adv]. В английском порядок слов ФИКСИРОВАН – именно он показывает, кто делает, а кто получает действие (в русском это делают падежи)."},{"type":"subheader","text":"Типы предложений"},{"type":"rule","topic":"Утвердительное","rule":"Subject + Verb + Object","desc":"Подлежащее делает действие. Порядок нарушать нельзя – иначе смысл меняется.","examples":"She reads books. ✓\nBooks reads she. ✗","formula":"S + V + O + (Adv.)","notes":""},{"type":"rule","topic":"Отрицательное","rule":"S + don't/doesn't/didn't + V₁","desc":"Отрицание вводится через вспомогательный глагол do/does/did.\ndo – I/you/we/they; does – he/she/it; did – прошедшее","examples":"She does not read. / She doesn't read.\nThey didn't come.","formula":"S + aux(neg) + V₁","notes":"Вспомогательный do 'берёт на себя' время – основной глагол без -s"},{"type":"tip","text":"💡  Почему does she read? а не she reads? – При образовании вопроса и отрицания вспомогательный глагол 'вытягивает' на себя грамматику времени. Поэтому основной глагол всегда в базовой форме: Does she READ (не reads)."},{"type":"rule","topic":"Вопрос Yes/No","rule":"Aux + S + V?","desc":"Вспомогательный глагол выносится ПЕРЕД подлежащим – это инверсия.","examples":"Does she read? / Is he happy? / Have you finished?","formula":"Aux + S + V?","notes":"Если уже есть вспомогательный (is/have/will) – он и выносится вперёд"},{"type":"rule","topic":"Вопрос Wh-","rule":"Wh + Aux + S + V?","desc":"Вопросительное слово стоит в самом начале, затем инверсия.","examples":"What does she read? / Where do you live? / When did he arrive?","formula":"Wh + Aux + S + V?","notes":""},{"type":"rule","topic":"Вопрос к подлежащему","rule":"Wh (=S) + V?","desc":"Если вопросительное слово само является подлежащим – инверсии НЕТ, вспомогательный do не нужен!","examples":"Who reads books? (не: Who does read?)\nWhat happened? (не: What did happen?)","formula":"Wh(=S) + V?","notes":"Глагол в форме 3 л. ед.ч.: Who reads? – She reads."},{"type":"tip","text":"💡  Вопрос к подлежащему – очень частая ошибка. Тест: если убрать who/what и подставить 'he', вопрос пропадает и остаётся нормальное предложение. Who reads? → He reads. ✓ Значит, инверсии нет."},{"type":"rule","topic":"Разделительный вопрос","rule":"утв. + neg.тег? / отриц. + pos.тег?","desc":"Краткий хвост-вопрос в конце. Тег – зеркально противоположный основному предложению.","examples":"She reads, doesn't she? / He isn't here, is he?\nThey've met, haven't they?","formula":"V, aux(neg)+S? / neg, aux+S?","notes":"Тег всегда из 2 слов: вспомог.+мест."},{"type":"rule","topic":"Императив (приказ/просьба)","rule":"V! / Don't + V!","desc":"Подлежащее 'you' опускается – оно подразумевается.\nВежливо: Please + V / Would you + V?","examples":"Read this! / Don't be late. / Please sit down.\nWould you close the door?","formula":"V! / Don't V!","notes":""},{"type":"rule","topic":"Восклицательное","rule":"What a/an + adj + N! / How + adj!","desc":"Выражают сильную эмоцию.","examples":"What a beautiful day! / What an idea!\nHow interesting! / How fast she runs!","formula":"What (a/an) + adj + N!\nHow + adj/adv!","notes":""},{"type":"rule","topic":"Вопрос-эхо","rule":"Aux + S?","desc":"Переспрос или удивление – повторяешь только вспомогательный + подлежащее из услышанного.","examples":"I passed the test! – Have you?\nShe's coming tonight. – Is she?\nHe went there. – Did he?","formula":"Aux + S?","notes":"↑ интонация = удивление; ↓ = констатация"}]},{"title":"2. ЧАСТИ РЕЧИ (Parts of Speech)","rows":[{"type":"rule","topic":"Существительное [n]","rule":"Noun","desc":"Люди, предметы, места, идеи. Бывают исчисляемые (a cat / cats) и неисчисляемые (water, music).","examples":"cat, freedom, music, London, idea","formula":"–","notes":"Неисчисл.: нет артикля a/an, нет -s"},{"type":"rule","topic":"Местоимение","rule":"Pronoun","desc":"Заменяет существительное, чтобы избежать повторений.","examples":"he, she, it, they, mine, himself","formula":"–","notes":""},{"type":"rule","topic":"Глагол [v]","rule":"Verb","desc":"Действия и состояния. Бывают переходные (transitive) – требуют дополнение – и непереходные (intransitive) – не требуют.","examples":"run (intrans.) / read a book (trans.) / seem tired (linking)","formula":"–","notes":""},{"type":"tip","text":"💡  Переходный глагол (Transitive) управляет дополнением – он 'требует' объект, иначе предложение незакончено. Сравни: She reads. (intrans. – ок) / She loves. – Что? Кого? (loves чего-то ждёт). She loves music. (trans. – ок). Это важно для понимания пассива: пассив образуется ТОЛЬКО от переходных глаголов."},{"type":"rule","topic":"Прилагательное [adj]","rule":"Adjective","desc":"Описывает существительное. В английском стоит ПЕРЕД noun (не после, как во многих языках).","examples":"happy child / a beautiful day / broken window","formula":"adj + noun","notes":"Не изменяется по роду/числу: happy cats / happy cat"},{"type":"rule","topic":"Наречие [adv]","rule":"Adverb","desc":"Описывает глагол, прилагательное или другое наречие. Часто образуется от adj + -ly.","examples":"run quickly / very happy / he works well / too fast","formula":"–","notes":"Исключения: fast, hard, late – одна форма"},{"type":"rule","topic":"Предлог","rule":"Preposition","desc":"Показывает отношения между словами. После предлога – только объектный падеж местоимения!","examples":"in, on, at, by, with, of, to, for\nbetween you and me (не I!)","formula":"prep + noun / pronoun (obj.)","notes":""},{"type":"rule","topic":"Союз","rule":"Conjunction","desc":"Соединяет слова или предложения.\nСочинительные (FANBOYS): for, and, nor, but, or, yet, so\nПодчинительные: because, although, when, if...","examples":"I like tea, but she prefers coffee.\nAlthough it rained, we went out.","formula":"–","notes":""},{"type":"rule","topic":"Артикль","rule":"Article","desc":"a/an – неопределённый; the – определённый; ∅ – нулевой","examples":"a cat / the cat I saw / cats are cute","formula":"–","notes":""}]},{"title":"3. АРТИКЛИ (Articles)","rows":[{"type":"tip","text":"💡  В русском языке артиклей нет – это одна из самых сложных тем для носителей русского. Артикль – это не просто 'маленькое слово перед существительным'. Он сигнализирует: новое это или известное? Конкретное или вообще? Одно или класс в целом?"},{"type":"rule","topic":"a / an","rule":"Неопределённый","desc":"Перед исчисляемым сущ. в ед.ч., которое:\n1. Упоминается впервые\n2. Является одним из многих\nПравило звука: a + согласный звук; an + гласный звук","examples":"a cat / a university [юни – согл. звук!]\nan apple / an hour [аур – гласный звук!]\nI saw a dog. (впервые)","formula":"a/an + новое/любое исч. сущ. ед.ч.","notes":"Важен ЗВУК, а не буква: a uniform (ю-) / an umbrella (а-)"},{"type":"rule","topic":"the","rule":"Определённый","desc":"Перед чем-то конкретным и известным и говорящему, и слушающему:\n1. Уже упомянуто\n2. Единственное в своём роде\n3. Оба знают, о чём речь","examples":"The dog I told you about.\nThe Sun / the Moon (единственные)\nCan you close the window? (оба знают, какое)","formula":"the + конкретное/известное/единственное","notes":"the /ðə/ + согласный звук; the /ðiː/ + гласный звук"},{"type":"rule","topic":"∅ нулевой","rule":"Нулевой артикль","desc":"Перед:\n1. Неисчисляемыми в общем смысле\n2. Мн.ч. в общем смысле\n3. Именами собственными, языками, видами спорта\n4. Устойчивые: at home, at school, in bed, by car","examples":"Water is life. / I like music.\nCats are cute. (кошки вообще)\nShe speaks English. / He plays football.\nat home / go to school (не the school)","formula":"∅ + обобщение / имя собств.","notes":""},{"type":"tip","text":"💡  Типичная ловушка: 'school' с артиклем и без – разный смысл. He goes to school. (он учится = функция здания) vs. He went to the school. (он пошёл в здание школы – как место). То же с church, hospital, prison, bed, work."}]},{"title":"4. МЕСТОИМЕНИЯ (Pronouns)","rows":[{"type":"subheader","text":"Личные местоимения"},{"type":"rule","topic":"Subject (субъектные)","rule":"I / you / he / she / it / we / they","desc":"Подлежащее – выполняет действие. Стоит ПЕРЕД глаголом.","examples":"I went. / She reads. / They are here.\nMy brother and I went. (не: me and my brother)","formula":"S + V","notes":"После and/or: My brother and I – не me"},{"type":"rule","topic":"Object (объектные)","rule":"me / you / him / her / it / us / them","desc":"Дополнение – получает действие. После глагола или предлога.","examples":"She told him. / Give it to me. / Between you and me.","formula":"V + O / prep + O","notes":"После предлога ВСЕГДА объектный: between you and me (не I)"},{"type":"tip","text":"💡  Частая ошибка (и в английском у носителей тоже): 'between you and I' – неверно! После предлога нужен объектный падеж: between you and me. Проверка: уберите одного – 'between I' звучит нелепо."},{"type":"subheader","text":"Притяжательные"},{"type":"rule","topic":"Possessive adjective","rule":"my/your/his/her/its/our/their","desc":"Стоит ПЕРЕД существительным, как прилагательное. Не путай its (притяж.) и it's (it is)!","examples":"my book / her idea / its colour (цвет объекта)\nIt's (=it is) cold. vs. Its fur is soft.","formula":"poss.adj + noun","notes":"its vs. it's – очень частая ошибка"},{"type":"rule","topic":"Possessive pronoun","rule":"mine/yours/his/hers/ours/theirs","desc":"Заменяет [poss.adj + noun] целиком, чтобы не повторяться.","examples":"This is your book. That one is mine.\nHer idea was good. Yours was better.","formula":"Stand-alone (без noun)","notes":"a friend of mine = один из моих друзей (не единственный)"},{"type":"subheader","text":"Возвратные и прочие"},{"type":"rule","topic":"Reflexive","rule":"myself/yourself/himself/herself/itself/ourselves/themselves","desc":"Субъект и объект – одно лицо. Или усиление (сам, лично).","examples":"I gave myself a headache.\nHe cooked it himself. (сам, лично)","formula":"S + V + refl.","notes":""},{"type":"rule","topic":"Generic 'they' ед.ч.","rule":"Singular they","desc":"Когда пол неизвестен или не важен – используют they/them/their даже для одного человека.","examples":"Somebody called. What did they want?\nEach student should bring their own pen.","formula":"singular → they/them/their","notes":"Нормативно в современном английском"}]},{"title":"5. ВРЕМЕНА ГЛАГОЛА – система 12 форм","rows":[{"type":"tip","text":"💡  Логика системы времён. 4 вида × 3 времени = 12. Четыре вида: Simple (факт/привычка), Continuous (процесс в моменте), Perfect (завершённость со связью с другим моментом), Perfect Continuous (процесс, растянутый до другого момента). Это не просто 'время когда' – это ракурс на действие."},{"type":"subheader","text":"Present – настоящее"},{"type":"rule","topic":"Present Simple","rule":"V₁ / V₁+s (3л.)","desc":"(+) S + V₁(s/es)\n(–) S + don't/doesn't + V₁\n(?) Do/Does + S + V₁?\nДля: факты, привычки, расписания, вечные истины","examples":"(+) She works every day.\n(–) He doesn't smoke.\n(?) Do they live here?\nWater boils at 100°C.","formula":"S + V₁ (3л. → +s/es)","notes":"Маркеры: always, usually, often, never, every day, on Mondays"},{"type":"rule","topic":"Present Continuous","rule":"am/is/are + V-ing","desc":"(+) S + am/is/are + V-ing\n(–) S + am/is/are + not + V-ing\n(?) Am/Is/Are + S + V-ing?\nДля: действие прямо сейчас, временная ситуация, запланированное ближайшее будущее","examples":"(+) She is working right now.\n(–) I'm not watching TV.\n(?) Are you coming tonight?\nI'm meeting him tomorrow at 5.","formula":"S + be(pres) + V-ing","notes":"Маркеры: now, at the moment, currently, look!, listen!, tonight, tomorrow"},{"type":"tip","text":"💡  Stative verbs – глаголы состояния не используются в Continuous: know, believe, understand, love, hate, want, need, have (=possess), see, hear, smell, taste, seem, appear. Нельзя: I am knowing the answer. Нужно: I know the answer. Логика: эти глаголы описывают состояние, а не активный процесс."},{"type":"rule","topic":"Present Perfect","rule":"have/has + V3","desc":"(+) S + have/has + V3\n(–) S + haven't/hasn't + V3\n(?) Have/Has + S + V3?\nДля: результат в настоящем, жизненный опыт, недавнее действие, ситуация начатая в прошлом и продолжающаяся","examples":"(+) I have lost my keys. (они потеряны сейчас)\n(–) She hasn't arrived yet.\n(?) Have you ever been to Japan?\nI've lived here for 5 years. (и сейчас живу)","formula":"S + have/has + V3","notes":"Маркеры: just, already, yet, ever, never, recently, for, since, so far"},{"type":"tip","text":"💡  Present Perfect – самая сложная тема для носителей славянских языков, потому что в русском это понятие не выражено отдельным временем. Ключевая идея: действие в прошлом, но его результат/связь с настоящим важна прямо сейчас. 'I have lost my keys' ≠ 'I lost my keys' (Past Simple). Первое говорит: ключей нет сейчас. Второе – просто факт прошлого. Поэтому с конкретным временем (yesterday, in 2020, at 5 PM) – только Past Simple, не Perfect."},{"type":"rule","topic":"Present Perfect Continuous","rule":"have/has + been + V-ing","desc":"Для: процесс начался в прошлом и продолжается / видны следы\n(+) S + have/has + been + V-ing","examples":"(+) I've been waiting for 2 hours. (всё ещё жду)\nShe's been crying. (глаза красные – видно)\nHow long have you been learning English?","formula":"S + have/has + been + V-ing","notes":"Маркеры: for, since, how long, all day, all morning"},{"type":"subheader","text":"Past – прошедшее"},{"type":"rule","topic":"Past Simple","rule":"V2 (прош. форма)","desc":"(+) S + V2\n(–) S + didn't + V₁\n(?) Did + S + V₁?\nДля: завершённое действие в конкретный момент прошлого","examples":"(+) She worked yesterday.\n(–) He didn't call.\n(?) Did they arrive on time?\nI saw him last Tuesday.","formula":"S + V2 (reg: +ed / irreg: V2)","notes":"Маркеры: yesterday, last week/year, in 2020, ago, then, when"},{"type":"tip","text":"💡  Past Simple vs Present Perfect. Если есть конкретное время в прошлом – только Past Simple. 'I saw him yesterday' (не have seen). 'Have you seen him?' (без времени – опыт). Тест: если можно добавить 'yesterday' и предложение не сломается – скорее всего Past Simple."},{"type":"rule","topic":"Past Continuous","rule":"was/were + V-ing","desc":"Для: процесс в конкретный момент прошлого, фон для другого действия.\nWhile = оба в процессе; When = фон + короткое событие","examples":"(+) At 9 PM I was reading.\nShe was cooking when he arrived.\nWhile I was sleeping, someone called.","formula":"S + was/were + V-ing","notes":"Маркеры: while, when, at that moment, at 9 PM yesterday"},{"type":"rule","topic":"Past Perfect","rule":"had + V3","desc":"Для: действие завершилось ДО другого прошлого момента.\n'Прошлое прошлого' – предпрошедшее","examples":"(+) She had left before I arrived.\n(–) He hadn't finished when we called.\nBy 2020, they had built the bridge.","formula":"S + had + V3","notes":"Маркеры: before, after, by the time, already, when, as soon as"},{"type":"tip","text":"💡  Past Perfect – логика: вы рассказываете о прошлом, и внутри этого прошлого одно событие произошло ещё раньше. 'When I arrived, she had already left' – её уход произошёл раньше моего прихода. Без had – 'she left' – непонятно, что было раньше."},{"type":"rule","topic":"Past Perfect Continuous","rule":"had + been + V-ing","desc":"Процесс шёл вплоть до момента в прошлом (длительность + результат в прошлом).","examples":"She had been working for 3 hours before she fell asleep.\nHe was tired because he had been running.","formula":"S + had + been + V-ing","notes":"Маркеры: for, since – перед прошлым событием"},{"type":"subheader","text":"Future – будущее"},{"type":"rule","topic":"will + V₁","rule":"Future Simple","desc":"Для: спонтанное решение прямо сейчас, предсказание (без доказательств), обещание, просьба\n(+) S + will + V₁\n(–) S + won't + V₁","examples":"I'll help you! (решил прямо сейчас)\nIt will probably rain. / I promise I won't tell.\nWill you please be quiet?","formula":"S + will + V₁","notes":"Маркеры: probably, I think, maybe, I promise, in the future"},{"type":"tip","text":"💡  will vs going to. Will – спонтанное решение или предсказание без улик. Going to – уже решено ДО момента речи или предсказание на основе видимых фактов. 'The phone is ringing – I'll get it!' (решил сейчас). 'I'm going to call him later' (уже планировал). 'Look at those clouds – it's going to rain!' (видны улики)."},{"type":"rule","topic":"be going to + V₁","rule":"Запланированное будущее","desc":"Для: намерение/план (решён заранее), очевидное предсказание на основе фактов","examples":"I'm going to visit Paris next summer.\nLook – she's going to fall!\nWe're going to get married.","formula":"S + am/is/are + going to + V₁","notes":""},{"type":"rule","topic":"Future Continuous","rule":"will + be + V-ing","desc":"Для: действие будет в процессе в конкретный момент будущего","examples":"At 8 PM tomorrow I will be having dinner.\nThis time next week I'll be lying on a beach.","formula":"S + will + be + V-ing","notes":"Маркеры: at this time tomorrow, when you arrive"},{"type":"rule","topic":"Future Perfect","rule":"will + have + V3","desc":"Для: действие завершится ДО определённого момента будущего","examples":"By Friday, I will have finished the report.\nBy 2030, scientists will have found a cure.","formula":"S + will + have + V3","notes":"Маркеры: by (the time), before, by 2030"},{"type":"rule","topic":"Future Perfect Continuous","rule":"will + have + been + V-ing","desc":"Для: процесс, который будет длиться вплоть до момента в будущем","examples":"By noon, I will have been working for 5 hours.","formula":"S + will + have + been + V-ing","notes":"Маркеры: by, for"},{"type":"subheader","text":"Сводная таблица 12 времён"},{"type":"rule","topic":"PAST\nPRESENT\nFUTURE","rule":"Simple:\nV2 / V₁(s) / will+V","desc":"Continuous:\nwas/were+Ving / am/is/are+Ving / will+be+Ving","examples":"Perfect:\nhad+V3 / have/has+V3 / will+have+V3","formula":"Perf.Continuous:\nhad+been+Ving / have/has+been+Ving / will+have+been+Ving","notes":"3×4=12"}]},{"title":"6. НЕЛИЧНЫЕ ФОРМЫ ГЛАГОЛА (Non-Finite Forms)","rows":[{"type":"tip","text":"💡  Неличные формы – это когда глагол используется не как сказуемое, а как другая часть речи. Инфинитив ведёт себя как существительное, причастие – как прилагательное, герундий – тоже как существительное (но с акцентом на процесс). Они не спрягаются – нет лица, числа, наклонения."},{"type":"rule","topic":"Infinitive (инфинитив)","rule":"to + V₁","desc":"Работает как существительное. Выражает цель, намерение, потенциальное действие.\nПосле: want, need, hope, plan, decide, agree, manage, seem, appear...","examples":"I want to learn. / To err is human.\nShe decided to stay. / He managed to escape.","formula":"to + V₁","notes":"Bare infinitive (без to): после модальных, make, let, help: I can go / let me do it"},{"type":"rule","topic":"Gerund (герундий)","rule":"V-ing","desc":"Работает как существительное – называет действие/процесс. После предлогов – ВСЕГДА герундий.\nПосле: enjoy, avoid, finish, mind, suggest, keep, consider, deny...","examples":"Swimming is healthy. / I enjoy reading.\nShe avoided looking at him. / before leaving","formula":"V-ing (как noun)","notes":"После предлога – только gerund: good at coding, instead of going, without knowing"},{"type":"rule","topic":"Participle I (прич.наст.вр.)","rule":"V-ing","desc":"Работает как прилагательное или наречие. Активный смысл – субъект сам совершает действие.","examples":"a running child / the boring lecture\nRunning fast, he caught the bus.","formula":"V-ing + noun / -ing clause","notes":"The man reading = тот, кто читает (активно)"},{"type":"rule","topic":"Participle II (прич.прош.вр.)","rule":"V3","desc":"Пассивный смысл – действие направлено на noun. В пассивных и perfect-конструкциях.","examples":"a broken window / the letter written by her\nThe food served was delicious.","formula":"V3 + noun / V3 clause","notes":"Broken window = окно, которое разбили (чьё-то действие на него)"},{"type":"tip","text":"💡  Gerund vs Infinitive после одних глаголов смысл меняется! remember + to-inf = помнить сделать (будущее): 'Remember to lock the door.' remember + gerund = помнить как делал (прошлое): 'I remember locking it.' Аналогично: stop (to smoke = остановился, чтобы закурить; smoking = перестал курить), try, forget, regret, mean, go on."},{"type":"rule","topic":"Gerund vs Infinitive","rule":"Смысловой сдвиг","desc":"remember, forget, stop, try, mean, regret, go on + inf/ger – разный смысл!\nПосле предлога – ВСЕГДА gerund.","examples":"Stop to smoke. (остановился чтобы)\nStop smoking. (перестал)\nTry to sleep. (постарайся)\nTry sleeping. (попробуй как вариант)","formula":"Inf → цель/будущее\nGer → прошлое/процесс","notes":""}]},{"title":"7. НАКЛОНЕНИЯ (Moods)","rows":[{"type":"tip","text":"💡  Наклонение – это не время, а отношение говорящего к действию: реальное оно или воображаемое? Описывает (Indicative) или приказывает (Imperative) или гипотетически допускает (Subjunctive)?"},{"type":"rule","topic":"Indicative (изъявительное)","rule":"Все 12 времён","desc":"Описывает реальные факты, ситуации, события.","examples":"She works every day. / It rained yesterday. / They will return.","formula":"–","notes":"Самое частое – ~90% речи"},{"type":"rule","topic":"Imperative (повелительное)","rule":"V₁ без subject","desc":"Приказы, просьбы, инструкции, запреты. 'You' подразумевается, но не говорится.","examples":"Read! / Don't touch that! / Please wait.\nWould you close the door? (вежливо)","formula":"V! / Don't + V!","notes":"Вежливость: Please + V / Would you + V?"},{"type":"rule","topic":"Subjunctive (сослагательное)","rule":"were (все лица) / base form V","desc":"Гипотезы, желания, нереальное. 'Were' для всех лиц – даже 'if I were'.\nВ придаточных формальных требований – base form без -s.","examples":"If I were you, I'd leave. (не: was)\nI wish I were taller. / He wishes she were here.\nI suggest that he be present. (formal)","formula":"If + were / base V (без -s!","notes":"В совр. разговорной речи was вместо were – допустимо"},{"type":"tip","text":"💡  If I were – почему not was? Сослагательное наклонение использует специальную форму 'were' для всех лиц. Это сигнал: говорящий описывает НЕ реальность, а воображаемую ситуацию. 'If I was' тоже понятно, но менее грамотно."}]},{"title":"8. УСЛОВНЫЕ ПРЕДЛОЖЕНИЯ (Conditionals)","rows":[{"type":"tip","text":"💡  Conditionals – не просто 'если'. Тип показывает, насколько реальна ситуация: 0 = всегда истина, 1 = возможно в реальности, 2 = нереально сейчас, 3 = нереально в прошлом (сожаление). Разница между 1 и 2 – не время, а вероятность."},{"type":"rule","topic":"Zero Conditional","rule":"If + P.Simple → P.Simple","desc":"Всегда истинные факты, законы природы. 'If' = 'when/whenever'","examples":"If you heat water to 100°C, it boils.\nIf she's late, she apologises.","formula":"If + P.S. → P.S.","notes":"Можно заменить if на when"},{"type":"rule","topic":"First Conditional","rule":"If + P.Simple → will + V","desc":"Реальные, возможные ситуации в будущем. Говорящий считает это вероятным.","examples":"If it rains tomorrow, I will stay home.\nIf she studies hard, she'll pass.","formula":"If + P.S. → will + V₁","notes":"Real / likely (50%+). Может быть: might/can вместо will"},{"type":"rule","topic":"Second Conditional","rule":"If + Past Simple → would + V","desc":"Нереальное или маловероятное сейчас или в будущем. Гипотеза.","examples":"If I had a million dollars, I would travel.\nIf she were here, she would help.\nIf I were you, I'd leave.","formula":"If + P.S.(were!) → would + V₁","notes":"Unreal present/future. were – для всех лиц"},{"type":"tip","text":"💡  Почему в 2nd Conditional Past Simple, а не Past? Это сослагательное: форма прошедшего времени здесь не обозначает прошлое – она сигнализирует нереальность. 'If I knew' = я не знаю (сейчас). Мозг воспринимает 'отступ во времени формы' как сигнал: это не реальность."},{"type":"rule","topic":"Third Conditional","rule":"If + Past Perfect → would have + V3","desc":"Нереальная ситуация в ПРОШЛОМ. Сожаление, критика того, чего не случилось.","examples":"If I had studied harder, I would have passed.\nIf she had told me, I would have helped.","formula":"If + P.Perf. → would have + V3","notes":"Unreal past – что могло быть, но не было"},{"type":"rule","topic":"Mixed Conditional","rule":"Past→Present или Past→Past+Present","desc":"Смешение: прошлое условие → настоящий результат (или наоборот)","examples":"If I had taken that job, I would be rich now.\nIf I were braver, I would have spoken up.","formula":"If+PP → would+V / If+PS(were) → would have+V3","notes":""}]},{"title":"9. ПАССИВНЫЙ ЗАЛОГ (Passive Voice)","rows":[{"type":"tip","text":"💡  Пассив – это когда объект действия становится подлежащим. Деятель (agent) либо неизвестен, либо неважен, либо скрывается. Пассив образуется ТОЛЬКО от переходных глаголов (тех, которые 'требуют' дополнение). Нельзя: 'The accident was happened' – happen непереходный."},{"type":"rule","topic":"Образование","rule":"be (нужное время) + V3","desc":"Деятель вводится через by – если важен. Формула: объект становится S, глагол → be+V3.","examples":"Active: She wrote the letter.\nPassive: The letter was written (by her).","formula":"S + be(tense) + V3 (+ by agent)","notes":""},{"type":"rule","topic":"Pres. Simple Passive","rule":"am/is/are + V3","desc":"","examples":"English is spoken worldwide.\nThe mail is delivered every day.","formula":"is/are + V3","notes":""},{"type":"rule","topic":"Past Simple Passive","rule":"was/were + V3","desc":"","examples":"The city was destroyed in 1945.\nShe was told the truth.","formula":"was/were + V3","notes":""},{"type":"rule","topic":"Pres. Perfect Passive","rule":"have/has been + V3","desc":"","examples":"The project has been completed.\nHe has been promoted.","formula":"have/has + been + V3","notes":""},{"type":"rule","topic":"Future Passive","rule":"will be + V3","desc":"","examples":"The results will be announced tomorrow.","formula":"will + be + V3","notes":""},{"type":"rule","topic":"Modal Passive","rule":"modal + be + V3","desc":"","examples":"It should be done. / It must be reported.\nThis can't be fixed.","formula":"modal + be + V3","notes":""},{"type":"rule","topic":"Когда использовать?","rule":"1. Деятель неизвестен\n2. Деятель очевиден\n3. Фокус на результате\n4. Формальный стиль","desc":"","examples":"My bike was stolen. (неизвестно кем)\nHe was arrested. (и так ясно – полиция)\nThe experiment was conducted.\nPassives are used in academic writing.","formula":"–","notes":"Частотен в новостях, науке, бизнес-English"}]},{"title":"10. МОДАЛЬНЫЕ ГЛАГОЛЫ (Modal Verbs)","rows":[{"type":"tip","text":"💡  Модальные глаголы – особый класс. Они не спрягаются (нет -s в 3 л.), после них всегда bare infinitive (без to), у них нет форм Past/Future напрямую. Они выражают не время, а отношение говорящего: умение, разрешение, обязанность, возможность, вероятность."},{"type":"rule","topic":"can / could","rule":"умение; возможность; разрешение; вежливость","desc":"can – настоящее\ncould – прошлое / вежливее / гипотетически\nNeg: cannot / can't; couldn't","examples":"I can swim. / Can I help?\nCould you repeat that? (вежливо)\nWhen I was 5, I could read.","formula":"modal + V₁ (bare)","notes":"could – вежливее и мягче, чем can"},{"type":"rule","topic":"may / might","rule":"предположение (возможность); разрешение (формально)","desc":"may – более уверенно (~50%+)\nmight – менее уверенно (~30-40%)","examples":"It may rain. / It might be true.\nMay I come in? (формально = разрешение)","formula":"may/might + V₁","notes":"might – чаще в гипотетических контекстах"},{"type":"rule","topic":"must / have to","rule":"обязанность; логический вывод","desc":"must – субъективная обязанность (я так решил) / уверенное предположение\nhave to – объективная необходимость (правило, обстоятельства)\nmustn't = запрет; don't have to = необязательно (не запрет!)","examples":"You must stop! (запрет) / I must be dreaming. (вывод)\nI have to work tomorrow. (расписание)\nYou don't have to come. (не обязан, но можешь)","formula":"must/have to + V₁","notes":""},{"type":"tip","text":"💡  mustn't ≠ don't have to – противоположные смыслы! mustn't = ЗАПРЕЩЕНО делать. don't have to = не обязательно, можешь и не делать. 'You mustn't tell anyone' = нельзя говорить. 'You don't have to tell anyone' = говорить необязательно, если не хочешь."},{"type":"rule","topic":"should / ought to","rule":"совет; долженствование (слабее must)","desc":"should = что правильно/рекомендуется\nshould have + V3 = критика или сожаление о прошлом","examples":"You should see a doctor. / Ought to = should (формальнее)\nShe should have called. (не позвонила – плохо)\nI should have studied more.","formula":"should + V₁\nshould have + V3 (прошлое)","notes":""},{"type":"rule","topic":"will / would","rule":"будущее; обещание; вежливость; гипотетическое","desc":"will – факт о будущем, спонтанное решение\nwould – вежливость, условность, habitual прошлое","examples":"I'll help you. / Would you close the door?\nI would go if I could. / He would always sing.","formula":"will/would + V₁","notes":"would + always/often = прошлая привычка"},{"type":"rule","topic":"need (to) / needn't","rule":"необходимость / отсутствие необходимости","desc":"needn't (modal) = не нужно\nneed to (обычный глагол) = нужно","examples":"You needn't worry. (modal: не нужно)\nDo you need to leave now? (обычный)","formula":"needn't + V / need to + V","notes":""},{"type":"rule","topic":"used to + V","rule":"регулярное прошлое (чего больше нет)","desc":"Регулярное действие/состояние в прошлом, которого нет сейчас.\nbe used to + V-ing = быть привыкшим к\nget used to + V-ing = привыкать к","examples":"I used to play piano. (больше не играю)\nShe used to live here.\nI'm used to waking up early. (привык)","formula":"used to + V₁ (прошлое)\nbe used to + V-ing (настоящая привычка)","notes":""}]},{"title":"11. ПРЯМАЯ И КОСВЕННАЯ РЕЧЬ","rows":[{"type":"tip","text":"💡  Косвенная речь – мы пересказываем чужие слова. Если глагол пересказа в прошлом (said, told, asked), времена 'отодвигаются на шаг': Present→Past, Past→Past Perfect, will→would, can→could. Логика: мы смотрим на события из ещё более позднего момента."},{"type":"rule","topic":"Сдвиг времён","rule":"Главный глагол в прошлом → сдвиг","desc":"am/is → was\nare → were\nV₁ → V2\nhave/has + V3 → had + V3\nwill → would\ncan → could\nmay → might","examples":"\"I am tired.\" → She said she was tired.\n\"I will help.\" → He said he would help.\n\"I can do it.\" → She said she could do it.\n\"I have done it.\" → He said he had done it.","formula":"Каждая форма → на 1 шаг назад","notes":"Не сдвигается: вечные истины, всё ещё актуальные факты"},{"type":"rule","topic":"Reported Questions\n(косвенный вопрос)","rule":"Порядок как в утверждении!\nYes/No → if/whether","desc":"Важно: никакой инверсии! Порядок слов – как в утвердительном предложении.","examples":"\"Do you like it?\" → He asked if I liked it.\n\"Where do you live?\" → She asked where I lived.\n\"Are you hungry?\" → He asked whether she was hungry.","formula":"He asked + if/whether + S+V\nHe asked + wh + S+V","notes":"Нет вопросительного знака в конце!"},{"type":"rule","topic":"Reported Commands\n(косвенный приказ)","rule":"tell/ask + S + (not) to + V","desc":"Приказы и просьбы становятся to-infinitive.\nЗапрет: not to + V","examples":"\"Come here!\" → He told me to come there.\n\"Don't touch it!\" → She told him not to touch it.\n\"Please wait.\" → She asked me to wait.","formula":"told/asked + S + (not) to + V₁","notes":""}]},{"title":"12. ПАДЕЖИ И УПРАВЛЕНИЕ (Cases & Government)","rows":[{"type":"tip","text":"💡  В русском падежи выражаются окончаниями слов. В английском почти нет падежных окончаний – их функцию берут на себя ПОРЯДОК СЛОВ и ПРЕДЛОГИ. Поэтому порядок слов в английском нарушать нельзя – именно он показывает, кто подлежащее, а кто дополнение."},{"type":"rule","topic":"Nominative / Subjective","rule":"Именительный","desc":"Существительное/местоимение в роли подлежащего.","examples":"I sat. / She is here. / My brother and I went.\nThey called.","formula":"S + V","notes":"I, he, she, we, they – субъектные формы"},{"type":"rule","topic":"Possessive","rule":"Притяжательный","desc":"Показывает принадлежность.\n's – ед.ч. / s' – мн.ч. на -s\nOf-конструкция – альтернатива для неодушевлённых","examples":"Jim's phone / the girls' team\nthe colour of the car (= the car's colour)","formula":"'s / s' / of + noun","notes":""},{"type":"rule","topic":"Objective","rule":"Объектный","desc":"Всё, что не подлежащее – после глагола или предлога.","examples":"She told him. / Give it to me. / Between you and me.","formula":"V + O / prep + O","notes":"me, him, her, us, them – объектные формы"},{"type":"rule","topic":"Переходность (Transitivity)","rule":"Transitive vs Intransitive","desc":"Переходный глагол требует дополнение – без него предложение незакончено.\nНепереходный – самодостаточен, дополнения нет.","examples":"She loves music. (trans: loves ЧТО?) ✓\nShe loves. (trans: незакончено) ✗\nHe sleeps. (intrans: самодостаточно) ✓\nThe accident happened. (intrans, пассив невозможен!)","formula":"Trans + O / Intrans (no O)","notes":"Пассив – только от переходных!"}]},{"title":"13. СРАВНЕНИЕ ПРИЛАГАТЕЛЬНЫХ И НАРЕЧИЙ","rows":[{"type":"rule","topic":"Comparative\n(сравнительная)","rule":"1-2 слога → +er / than\n3+ слога → more + adj / than","desc":"bigger / faster / happier / more interesting\nShe is taller than him.","examples":"adj+er / more+adj + than","formula":"Irregular: good→better / bad→worse / far→farther/further","notes":""},{"type":"rule","topic":"Superlative\n(превосходная)","rule":"1-2 слога → the +est\n3+ слога → the most + adj","desc":"the biggest / the fastest / the happiest / the most interesting\nShe is the tallest in the class.","examples":"the + adj+est / the most+adj","formula":"Irregular: good→best / bad→worst / far→farthest","notes":""},{"type":"rule","topic":"As...as (равенство)","rule":"as + adj/adv + as","desc":"Одинаковая степень. Отрицание: not as/so...as","examples":"She is as tall as her brother.\nHe doesn't run as fast as she does.","formula":"as + adj + as","notes":""}]},{"title":"14. КЛЮЧЕВЫЕ ПРЕДЛОГИ (Key Prepositions)","rows":[{"type":"rule","topic":"Место (точное положение): \nin / on / at","rule":"IN: внутри / страна, город\nON: на поверхности / этаж / улица (BrE)\nAT: в функциональной точке / адрес / место","desc":"in a box / in London / in Russia\non the table / on the 3rd floor\nat the door / at 10 Oxford Street / at home, at work\n\nAT = участие в процессе, для которого объект создан (ем за столом, жду на остановке):\n\nAT school → не просто здание, а процесс учебы\n\nAT work → не просто офис, а процесс работы\n\nAT the bus stop → не просто столб с табличкой, а процесс ожидания\n\nAT the table → не просто мебель, а процесс еды/работы\n\nAT the door → cтою В дверях (собираюсь войти/выйти)","examples":"","formula":"","notes":""},{"type":"rule","topic":"Место (относительное положение): \nby / near / next to","rule":"BY: вплотную рядом (функциональная близость, доступность, не обязательно по порядку)\nNEAR: в зоне досягаемости, но дистанция не важна\nNEXT TO: рядом по порядку, в очереди / ряду (подразумевает, что объекты являются соседями → между ними ничего/никого нет)","desc":"BY:\n\nWait by the door. (Жди в зоне доступа к двери.)\nStand by the window. (Ты у окна, но это не \"сосед\" по порядку, а просто локация.)\n\nNEAR (самый размытый → он просто говорит, что объекты в пределах досягаемости, но дистанция может быть любой – от метров до километров):\n\nnear the station (в районе станции → может быть в 5 минутах или в 500 метрах)\nnear the park (около парка)\nnear the end (ближе к концу)\n\nNEXT TO:\n\nI stand next to him in line. (Мы соседи по очереди, между нами никого.)\nMy house is next to the bank. (Дома стоят рядом по улице, по порядку.)\nPut the glass next to the plate. (Бокал ставят вплотную к тарелке.)","examples":"","formula":"","notes":""},{"type":"tip","text":"💡  AT vs IN: ГЛАВНАЯ ЛОГИКА\n\nAT = Точка на карте + Функция / Намерение. Я здесь, чтобы сделать то, для чего это место создано.\nIN = Коробка / Пространство. Я просто внутри (физически), независимо от функции.\n\nПроверочный вопрос: «Есть ли у меня ЦЕЛЬ, связанная с функцией этого места?»\n\nДА = AT (даже если функция выполняется частично).\nНЕТ (просто нахожусь внутри) = IN, но тогда нужно пояснение.\n\n(!) Если я использую предлог IN (просто пространство), но не использую это пространство по его прямому назначению – я обязан дать контекст, чтобы у собеседника не возникло ложных ожиданий.\n\nI'm in a cafe [здесь у собеседника вопрос: «Зачем? Ты пьёшь кофе?»]\n+ hiding from the rain [пояснение, которое всё расставляет по местам].\n\nI'm at the office, just grabbing some documents. I'll be quick. Я в офисе, просто заберу документы (здесь все равно функция, документы связаны с работой в офисе). Я быстро.\n\nПочему это важно?\n\n❌ \"Where are you?\" – \"I'm in a cafe.\"\n👉 Собеседник: \"Oh, nice! What coffee did you get?\"\n\n✅ \"Where are you?\" – \"I'm in a cafe, hiding from the rain.\"\n👉 Собеседник: \"Oh, it's raining there? Stay dry!\"\n\n(!) Если ты в точке с функцией, но НЕ по функции, ты обязан это пояснить, иначе будет недопонимание.\n\n❌ \"I'm at school.\" (все думают: учишься)\n✅ \"I'm at school, picking up my brother.\" (пояснил – вопросов нет)"},{"type":"tip","text":"❌ AT нельзя использовать с глаголами движения\n\nwalk (гулять) → walk in (в парке) / through (через парк) / around (по окрестностям)\n\nrun (бегать) → run in (на стадионе) / around (вокруг стадиона)\n\ndrive (ехать) → drive in (по городу) / through (через город)\n\nswim (плавать) → swim in (в бассейне / в озере)\n\nfly (летать) → fly in (в небе) / through (сквозь облака)\n\njump (прыгать) → jump in (в воду) / on (на кровать / на месте) / over (через забор)\n\nwander (бродить) → wander in (по лесу) / through (по полю) / around (вокруг озера)\n\ndance (танцевать) → dance in (в зале) / on (на сцене)"},{"type":"tip","text":"💡💡  NEAR / BY / AT\n\nПредставьте коридор и дверь в конце:\n\nNEAR the door → вы в начале коридора. Дверь далеко, но вы знаете, где она. Просто констатация: «она недалеко».\n\nBY the door → вы уже дошли до конца коридора, стоите в паре шагов от двери. Вы в зоне двери.\n\nAT the door → вы подошли вплотную, ваша рука тянется к ручке или вы уже стучите / звоните. Вы на пороге.\n\nВплотную (физика) + Желание войти/постучать (функция) = AT"},{"type":"rule","topic":"Время: in / on / at","rule":"IN: месяц, год, сезон, часть дня\nON: день недели, дата\nAT: точное время","desc":"in March / in 2020 / in summer / in the morning\non Monday / on 5 February\nat 9 AM / at noon / at night / at Christmas","examples":"in/on/at + time noun","formula":"at night (не in night!), in the morning/afternoon/evening","notes":""},{"type":"rule","topic":"Транспорт: on / in","rule":"ON: можно встать и пройти\nIN: маленький, нужно садиться","desc":"on a train / bus / tram / plane / boat / bicycle\nin a car / taxi / helicopter","examples":"on/in + transport","formula":"get on/off ↔ get in/out of","notes":"Почему 'on a bus', но 'in a car'? Логика пространства: в автобусе/поезде/самолёте есть пространство для движения – ты 'на борту'. В машине/такси ты буквально сидишь внутри тесного пространства – ты 'внутри'."},{"type":"rule","topic":"IN vs INTO: выбор по типу действия","rule":"ГРУППА 1: Глаголы физического перемещения (move, walk, come, go, run, jump, fall):\n\nINTO = процесс движения извне внутрь → walk into the room (подчеркиваем ТРАЕКТОРИЮ: снаружи → внутрь)\nIN = уже внутри + движение внутри → walk in the room (уже внутри и ходим по комнате)\n\nГРУППА 2: Глаголы положения/покоя (be, stay, remain, sit, stand, lie):\n\nТолько IN = эти глаголы описывают СОСТОЯНИЕ, а не движение → be in the room, sit in the car\n\nГРУППА 3: Глаголы восприятия/взгляда (look, stare, gaze, peer):\n\nIN = в отражение/глубину → look in the mirror, stare in the water, gaze in the distance = Взгляд как СОСТОЯНИЕ (застыл, смотрит вглубь)\nINTO = в полый предмет / переносно → look into the box (в коробку), look into the matter (расследовать), look into his eyes (в глаза) = взгляд как ПРОНИКНОВЕНИЕ (физическое или метафорическое)\n\nГРУППА 4: Глаголы помещения/изменения положения (put, place, throw, pour):\n\nINTO = для перемещения объекта внутрь → put the book into the bag, pour water into the glass\nIN = результат или упрощение → the book is in the bag (объект уже внутри)\n\nГРУППА 5: Глаголы превращения/изменения (turn, change):\n\nВсегда INTO (turn, change, transform) = turn water into wine, change into a butterfly → переход из одного состояния в другое","desc":"","examples":"","formula":"","notes":""},{"type":"rule","topic":"Объект внимания: \nформа vs содержание","rule":"AT: смотрим на объект целиком\nIN: смотрим внутрь (отражение, глубина)","desc":"look at this chair (на предмет)\nlook at the mirror (на раму, стекло)\nlook in the mirror (на отражение)","examples":"","formula":"если вы рассматриваете сам объект (дизайн, форму) = AT\nесли вы пытаетесь проникнуть взглядом внутрь/сквозь = IN","notes":""},{"type":"rule","topic":"Направление:\nto / towards / into","rule":"TO: движение к точке (с акцентом на достижение)\nTOWARDS: движение по направлению (достижение не важно)\nINTO: проникновение внутрь (снаружи → внутрь)","desc":"go to London (добраться до Лондона)\nwalk towards the door (идти в сторону двери)\ngo into the house (войти внутрь дома)\nfall into the water (упасть в воду)","examples":"to + place\ntowards + place\ninto + noun (полый/ограниченный)","formula":"TO = достиг точки (финал)\nTOWARDS = направление (процесс, финал не важен)\nINTO = пересечение границы внутрь (ср. go in the room – уже внутри)","notes":""},{"type":"rule","topic":"Время (расширенные):\nduring / for / by / until / since","rule":"DURING: в течение (конкретного периода/события)\nFOR: на протяжении (длительности)\nBY: не позднее (дедлайн)\nUNTIL: вплоть до (конец периода)\nSINCE: с (момента начала)","desc":"during the meeting (в ходе собрания)\nfor two hours (в течение двух часов)\nfinish by 5 PM (до 17:00)\nwait until Monday (ждать до понедельника)\nsince 2020 (с 2020 года)","examples":"during + noun\nfor + duration\nby / until / since + time point","formula":"BY = дедлайн (до и включительно)\nUNTIL = граница, до которой длится действие\nFOR vs DURING: for = сколько длилось, during = когда именно\nSINCE = с прошлого момента до сейчас (Perfect)","notes":""},{"type":"rule","topic":"Причина / цель:\nfor / to / because of / due to","rule":"FOR: предназначение или получатель\nTO (+ инфинитив): цель действия\nBECAUSE OF: причина (= из-за, noun/pronoun)\nDUE TO: причина (формальнее, noun phrase)","desc":"I bought it for you (для тебя)\nShe left early to catch the train (чтобы успеть)\nCancelled because of rain (из-за дождя)\nDelayed due to technical issues (по причине)","examples":"for + noun\nto + infinitive\nbecause of / due to + noun","formula":"BECAUSE OF vs DUE TO: смысл одинаков, due to – книжнее\nTO ≠ FOR: to = цель действия (глагол после), for = предназначение (noun после)","notes":""},{"type":"rule","topic":"Тема / отношение:\nabout / of / with / on","rule":"ABOUT: тема разговора / мыслей\nOF: принадлежность, состав, часть чего-то\nWITH: совместность, инструмент, согласие\nON: тема в письменном/официальном контексте","desc":"talk about the plan (говорить о плане)\nthink of a solution (думать о решении)\nagree with him (соглашаться с ним)\na report on climate change (доклад по теме)","examples":"about / of / with / on + noun","formula":"ABOUT vs ON: about – разговорно, on – формально (lecture on, report on)\nTHINK OF vs THINK ABOUT: of = моментальная мысль / мнение, about = обдуманно размышлять","notes":""}]},{"title":"15. СОГЛАСОВАНИЕ ПОДЛЕЖАЩЕГО И СКАЗУЕМОГО (Subject–Verb Agreement)","rows":[{"type":"rule","topic":"Коллективные noun","rule":"BrE: мн.ч. / AmE: ед.ч.","desc":"The team are/is winning. / The government have/has decided.","examples":"family, team, government, staff, audience","formula":"–","notes":""},{"type":"rule","topic":"Either/Neither","rule":"either...or / neither...nor → глагол согласуется с ближайшим S","desc":"Either the teacher or the students are wrong.\nNeither he nor she knows.","examples":"–","formula":"","notes":""}]},{"title":"16. СЛОЖНЫЕ ПРЕДЛОЖЕНИЯ – ПРИДАТОЧНЫЕ","rows":[{"type":"rule","topic":"Relative clauses\n(определительные)","rule":"who / which / that / whose / where","desc":"Defining (без запятых): уточняет, о каком noun речь – убери, смысл изменится.\nNon-defining (с запятыми): просто доп. информация – можно убрать.","examples":"The man who lives next door is a doctor. (defining)\nMy brother, who lives in London, called me. (non-defining)","formula":"N + who/which/that + clause","notes":"Defining: that или who/which. Non-defining: только who/which"},{"type":"tip","text":"💡  Defining vs Non-defining – простой тест: уберите придаточное. Если смысл изменился критически (непонятно, о ком речь) – defining, запятые не нужны. Если просто потеряли дополнительную информацию – non-defining, нужны запятые."},{"type":"rule","topic":"Adverbial clauses\n(обстоятельственные)","rule":"when/while/because/although/if/unless/until...","desc":"Выражают время, причину, условие, уступку.","examples":"Although it rained, we went out. / I'll call when I arrive.\nUnless you hurry, you'll be late.","formula":"conjunction + S + V","notes":""},{"type":"rule","topic":"Noun clauses\n(именные)","rule":"that / if / whether / wh-words","desc":"Заменяют noun – подлежащее или дополнение.","examples":"I know that she is right. / I wonder if he'll come.\nWhat he said surprised me.","formula":"V + that/if + S+V","notes":""}]}];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let ALL = [];
let scores = {};     // word -> 'know'|'maybe'|'skip'
let picked = new Set();  // selected for drill
let vocFilt = 'All';
let statusFilt = 'all'; // 'all'|'know'|'maybe'|'skip'|'none'
let filteredList = []; // current filtered list for select-all
let drillMode = 'quiz'; // 'cards'|'quiz'|'input'
let curWord = null;    // for modal

// Drill state
let deck = [], didx = 0, cardFlipped = false, inputDone = false;
let dstats = { know: 0, maybe: 0, skip: 0 };
let cardHistory = []; // for prev button in card mode
let curStatType = '';

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
function init() {
  ALL = [...ALL_BASE];
  loadCustom();
  buildVCats();
  renderVocab();
  buildGram();
  updatePills();
}

// ══════════════════════════════════════════════
//  VOCABULARY PAGE
// ══════════════════════════════════════════════
const CATS = ['All', 'Verbs', 'Nouns', 'Adjectives', 'Adverbs', 'Phrasal Verbs', '_custom'];
const CLAB = { All: 'All', Verbs: 'Verbs', Nouns: 'Nouns', Adjectives: 'Adj', Adverbs: 'Adv', 'Phrasal Verbs': 'Phrasal', _custom: 'My Words' };
const CC = { Verbs: 'cv', Nouns: 'cn', Adjectives: 'cj', Adverbs: 'cr', 'Phrasal Verbs': 'cp', _custom: 'cm' };
const DC = { know: 'dg', maybe: 'da', skip: 'dr' };

function catCls(cat) { return CC[cat] || 'cv'; }

function buildVCats() {
  const w = document.getElementById('vfchips');
  w.innerHTML = '';
  CATS.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'chip' + (cat === 'All' ? ' on' : '');
    b.dataset.vc = cat;
    b.textContent = CLAB[cat];
    b.onclick = () => { vocFilt = cat; document.querySelectorAll('[data-vc]').forEach(x => x.classList.toggle('on', x.dataset.vc === cat)); renderVocab(); };
    w.appendChild(b);
  });
}

function renderVocab() {
  try {
  const q = (document.getElementById('vsi').value || '').toLowerCase().trim();
  let list = ALL;
  if (vocFilt !== 'All') list = list.filter(c => vocFilt === '_custom' ? c._custom : c.cat === vocFilt);
  if (q) list = list.filter(c => c.word.toLowerCase().includes(q) || c.tr.toLowerCase().includes(q));
  // Status filter
  if (statusFilt !== 'all') {
    if (statusFilt === 'none') list = list.filter(c => !scores[c.word]);
    else list = list.filter(c => scores[c.word] === statusFilt);
  }
  filteredList = list; // save for select-all

  document.getElementById('vcnt').textContent = list.length + ' words';
  const el = document.getElementById('vlist');
  el.innerHTML = '';

  // Render all words
  list.forEach(card => {
    const sc = scores[card.word];
    const isSel = picked.has(card.word);
    const div = document.createElement('div');
    div.className = 'vrow' + (isSel ? ' sel' : '');

    const chk = document.createElement('div');
    chk.className = 'vchk' + (isSel ? ' on' : '');
    chk.innerHTML = isSel ? '&#10003;' : '';
    chk.onclick = e => { e.stopPropagation(); togglePick(card.word); };

    const w = document.createElement('div'); w.className = 'vw'; w.textContent = card.word;
    const t = document.createElement('div'); t.className = 'vt'; t.textContent = card.tr.split('/')[0].split(',')[0].trim();
    const pos = document.createElement('div'); pos.className = 'vpos ' + catCls(card.cat); pos.textContent = CLAB[card.cat] || card.cat;
    const dot = document.createElement('div'); dot.className = 'vdot ' + (DC[sc] || ''); dot.title = sc ? { know: 'Know it', maybe: 'Almost', skip: 'Hard' }[sc] : 'Not reviewed';

    div.appendChild(chk); div.appendChild(w); div.appendChild(t); div.appendChild(pos); div.appendChild(dot);
    div.addEventListener('click', () => openModal(card));
    el.appendChild(div);
  });
  updateSelbar();
  } catch(e) { console.error('renderVocab:', e); }
}

function launchDrill(pool) {

function restartDrill(onlyHard) {
  document.getElementById('drillRes').classList.remove('on');
  dstats = { know: 0, maybe: 0, skip: 0 };
  let pool = [...deck]; // same deck
  if (onlyHard) {
    const hard = new Set(Object.entries(scores).filter(([, v]) => v === 'skip').map(([k]) => k));
    pool = pool.filter(c => hard.has(c.word));
    if (!pool.length) pool = [...deck];
  }
  deck = shuf(pool);
  didx = 0; cardHistory = [];
  showDrillCard();
}

// ══════════════════════════════════════════════
//  DRILL CARD LOGIC
// ══════════════════════════════════════════════
const shuf = a => { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; } return b; };

function showDrillCard() {
  if (didx >= deck.length) { showDrillResults(); return; }
  const c = deck[didx];
  cardFlipped = false; inputDone = false;

  document.getElementById('card3d').classList.remove('flip');
  document.getElementById('drillRes').classList.remove('on');

  // Front
  document.getElementById('fCat').textContent = c.cat;
  document.getElementById('fIdx').textContent = (didx + 1) + '/' + deck.length;

  const fF = document.getElementById('fForms');
  fF.innerHTML = '';

  // Back
  document.getElementById('bCat').textContent = c.cat;
  document.getElementById('bWord').textContent = c.word;
  document.getElementById('bTr').textContent = c.tr;
  const bx = document.getElementById('bEx');
  if (c.ex) { document.getElementById('bExEn').textContent = c.ex; document.getElementById('bExRu').textContent = c.exr || ''; bx.style.display = 'block'; }
  else bx.style.display = 'none';

  // Mode-specific setup
  const qg = document.getElementById('qgrid');
  const iz = document.getElementById('izone');
  const cn = document.getElementById('cardNav');
  qg.style.display = 'none'; iz.style.display = 'none'; cn.style.display = 'flex';
  document.getElementById('cardScene').style.pointerEvents = 'auto';

  if (drillMode === 'cards') {
    document.getElementById('fWord').textContent = c.word;
    document.getElementById('fPh').textContent = c.ph || '';
    document.getElementById('fHint').textContent = 'tap to flip';
    if ((c.cat === 'Verbs' || c.cat === 'Phrasal Verbs') && c.v2) {
      fF.innerHTML = `<div class="cvf"><span>V2</span>${esc(c.v2)}</div><div class="cvf"><span>V3</span>${esc(c.v3 || '—')}</div>`;
    }
    document.getElementById('flipBtn').style.display = 'flex';
    document.getElementById('btnPrev').disabled = didx === 0;
  } else if (drillMode === 'quiz') {
    document.getElementById('fWord').textContent = c.word;
    document.getElementById('fPh').textContent = c.ph || '';
    document.getElementById('fHint').textContent = 'choose translation';
    cn.style.display = 'none';
    document.getElementById('cardScene').style.pointerEvents = 'none';
    qg.style.display = 'grid';
    buildQuiz(c);
  } else { // input
    document.getElementById('fWord').textContent = c.tr.split('/')[0].split(',')[0].trim();
    document.getElementById('fPh').textContent = '';
    document.getElementById('fHint').textContent = 'type English ↓';
    cn.style.display = 'none';
    document.getElementById('cardScene').style.pointerEvents = 'none';
    iz.style.display = 'flex';
    buildInput(c);
  }

  updateDrillProg();
  animCard();
}

function animCard() {
  const s = document.getElementById('cardScene');
  s.style.animation = 'none'; void s.offsetWidth; s.style.animation = 'cin .2s ease';
}
function shakeCard() {
  const s = document.getElementById('cardScene');

}

// Card mode
function doFlip() {
  cardFlipped = !cardFlipped;
  document.getElementById('card3d').classList.toggle('flip', cardFlipped);
}

function cardNext() {
  cardHistory.push(didx);
  didx++;
  cardFlipped = false;
  if (didx >= deck.length) { showDrillResults(); return; }
  showDrillCard();
}

function cardPrev() {
  if (cardHistory.length === 0) return;
  didx = cardHistory.pop();
  cardFlipped = false;
  showDrillCard();
}

document.getElementById('cardScene').addEventListener('click', () => {
  if (drillMode === 'cards') doFlip();
});

// Touch swipe for card mode
let _tx = 0;
document.getElementById('cardScene').addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, { passive: true });
document.getElementById('cardScene').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _tx;
  if (Math.abs(dx) > 60 && drillMode === 'cards') {

    else cardNext();
  }
}, { passive: true });

// Quiz
function buildQuiz(card) {
  const pool = ALL.filter(c => c.word !== card.word && c.cat === card.cat);
  const correct = card.tr.split('/')[0].split(',')[0].trim();
  const opts = shuf([correct, ...shuf(pool).slice(0, 3).map(c => c.tr.split('/')[0].split(',')[0].trim())]);
  const g = document.getElementById('qgrid');
  g.innerHTML = '';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'qb'; b.textContent = o;
    b.onclick = () => answerQuiz(b, o, correct, card.word);
    g.appendChild(b);
  });
}
function answerQuiz(btn, chosen, correct, word) {
  document.querySelectorAll('.qb').forEach(b => { b.disabled = true; if (b.textContent === correct) b.classList.add('ok'); });
  if (chosen !== correct) { btn.classList.add('ng'); shakeCard(); }
  // Quiz: track session stats only, don't set permanent status
  if (chosen !== correct) dstats.skip++; else dstats.know++;
  updatePills();
  setTimeout(() => { didx++; showDrillCard(); }, 820);
}

// Input (Type EN)
function buildInput(card) {
  const isV = (card.cat === 'Verbs' || card.cat === 'Phrasal Verbs') && card.v2;
  ['iV1', 'iV2', 'iV3', 'iMain'].forEach(id => { const el = document.getElementById(id); if (el) { el.value = ''; el.className = 'ifield'; } });

    setTimeout(() => document.getElementById('iMain').focus(), 80);
  }
}

function nm(s) { return s.toLowerCase().trim().replace(/[()[\]]/g, '').replace(/\s+/g, ' '); }

function checkInput() {
  if (inputDone) return;
  const card = deck[didx];
  const isV = (card.cat === 'Verbs' || card.cat === 'Phrasal Verbs') && card.v2;
  let allOk = true;

  if (isV) {
    const v1e = document.getElementById('iV1'), v2e = document.getElementById('iV2'), v3e = document.getElementById('iV3');
    const v1ok = (() => { const a = nm(v1e.value); const w = nm(card.word.split('(')[0]); return a === w || a === w.split(' ')[0] || w.startsWith(a+' '); })();
    // Accept full form ("abstracted from") OR just core verb ("abstracted")
    const matchForm = (answer, form) => {
      const a = nm(answer); const f = nm(form.split('(')[0]);
      return a === f || a === f.split(' ')[0] || f === a.split(' ')[0] || f.startsWith(a+' ');
    };
    const v2ok = card.v2.split('/').some(s => matchForm(v2e.value, s));
    const v3ok = !card.v3 || card.v3.split('/').some(s => matchForm(v3e.value, s));
    v1e.className = 'ifield ' + (v1e.value ? (v1ok ? 'ok' : 'ng') : 'ng');
    v2e.className = 'ifield ' + (v2e.value ? (v2ok ? 'ok' : 'ng') : 'ng');
    if (card.v3) v3e.className = 'ifield ' + (v3e.value ? (v3ok ? 'ok' : 'ng') : 'ng');
    allOk = v1ok && v2ok && v3ok;
    if (allOk) { document.getElementById('ihint').textContent = '✓ Perfect!'; document.getElementById('ihint').style.color = 'var(--gr)'; }
    else { document.getElementById('ihint').textContent = card.word + ' · V2: ' + card.v2 + (card.v3 ? ' · V3: ' + card.v3 : ''); document.getElementById('ihint').style.color = 'var(--rd)'; shakeCard(); }
  } else {
    const el = document.getElementById('iMain');
    if (!el.value.trim()) return;
    const ok = nm(el.value) === nm(card.word.split('(')[0]);
    el.className = 'ifield ' + (ok ? 'ok' : 'ng');
    if (ok) { document.getElementById('ihint').textContent = '✓ Correct!'; document.getElementById('ihint').style.color = 'var(--gr)'; allOk = true; }
    else { document.getElementById('ihint').textContent = 'Answer: ' + card.word; document.getElementById('ihint').style.color = 'var(--rd)'; shakeCard(); allOk = false; }
  }

  inputDone = true;
  document.getElementById('ibtns').style.display = 'none';
  document.getElementById('typeStatus').style.display = 'flex';

  // Pre-select the suggested status
  if (allOk) { setScore(deck[didx].word, 'know'); dstats.know++; }
  else { setScore(deck[didx].word, 'skip'); dstats.skip++; }
  updatePills();
}

function setStatusAndNext(sc) {

  didx++;
  showDrillCard();

function updatePills() {
  const k = Object.values(scores).filter(v => v === 'know').length;

}

function openStatDr(type) {
  curStatType = type;
  const titles = { know: '✓ Know it', maybe: '~ Almost', skip: '✗ Hard', all: 'All reviewed' };
  let words = type === 'all'
    ? Object.entries(scores).map(([w, s]) => ({ word: w, score: s }))
    : Object.entries(scores).filter(([, v]) => v === type).map(([w, s]) => ({ word: w, score: s }));

  document.getElementById('statDrTitle').textContent = titles[type] + ' — ' + words.length;
  const list = document.getElementById('sdlist');
  list.innerHTML = '';
  if (!words.length) { list.innerHTML = '<div class="dr-empty">No words yet</div>'; openOv('statDr'); return; }

  words.forEach(({ word }) => {
    const card = ALL.find(c => c.word === word);
    if (!card) return;
    const div = document.createElement('div');
    div.className = 'sdi';
    div.innerHTML = `<div class="sdi-w">${esc(card.word)}</div><div class="sdi-t">${esc(card.tr.split('/')[0].split(',')[0])}</div>
      <div class="sdi-bs">
        <button class="sdib sbg" onclick="event.stopPropagation();setScore('${esc2(card.word)}','know');rebuildStat()">✓</button>
        <button class="sdib sba" onclick="event.stopPropagation();setScore('${esc2(card.word)}','maybe');rebuildStat()">~</button>
        <button class="sdib sbr" onclick="event.stopPropagation();setScore('${esc2(card.word)}','skip');rebuildStat()">✗</button>

function buildGram() {
  const sb = document.getElementById('gsidebar');
  const ct = document.getElementById('gcontent');
  const mn = document.getElementById('gmobnav');
  sb.innerHTML = ''; ct.innerHTML = ''; mn.innerHTML = '';

  GRAM_DATA.forEach((sec, i) => {
    const short = sec.title.replace(/^\d+\.\s*/, '').split('(')[0].trim();
    const num = (sec.title.match(/^(\d+)/) || ['', ''])[1];

    const sbi = document.createElement('div');
    sbi.className = 'gsbi' + (i === 0 ? ' on' : '');
    sbi.innerHTML = `<span class="gsbi-n">${num}.</span>${short}`;
    sbi.onclick = () => selGram(i);
    sb.appendChild(sbi);

    const mnb = document.createElement('button');
    mnb.className = 'gmnb' + (i === 0 ? ' on' : '');
    mnb.textContent = num + '. ' + short.split(' ').slice(0, 2).join(' ');
    mnb.onclick = () => selGram(i);
    mn.appendChild(mnb);

    const sd = document.createElement('div');
    sd.className = 'gsec' + (i === 0 ? ' on' : '');
    let html = `<div class="gsec-t">${esc(sec.title)}</div>`;
    let inT = false;
    sec.rows.forEach(row => {
      if (row.type === 'tip') {
        if (inT) { html += '</tbody></table></div>'; inT = false; }
        html += `<div class="gtip${row.text.startsWith('❌') ? ' w' : ''}">${esc(row.text)}</div>`;
      } else if (row.type === 'subheader') {
        if (inT) { html += '</tbody></table></div>'; inT = false; }
        html += `<div class="gsub">${esc(row.text)}</div>`;
      } else if (row.type === 'rule') {
        if (!inT) { html += `<div class="gtw"><table class="gt"><thead><tr><th>Topic</th><th>Rule</th><th>Description</th><th>Examples</th></tr></thead><tbody>`; inT = true; }
        html += `<tr><td class="gttop">${esc(row.topic)}</td><td class="gtrul">${esc(row.rule)}</td><td class="gtdsc">${esc(row.desc)}</td><td class="gtex">${esc(row.examples)}</td></tr>`;
      }
    });
    if (inT) html += '</tbody></table></div>';
    sd.innerHTML = html;
    ct.appendChild(sd);
  });
}
function selGram(i) {
  document.querySelectorAll('.gsbi').forEach((e, j) => e.classList.toggle('on', j === i));
  document.querySelectorAll('.gmnb').forEach((e, j) => e.classList.toggle('on', j === i));
  document.querySelectorAll('.gsec').forEach((e, j) => e.classList.toggle('on', j === i));
}
function filterGram() {
  const q = document.getElementById('gsrch').value.toLowerCase().trim();
  if (!q) { buildGram(); return; }
  document.querySelectorAll('.gsec').forEach(sec => {
    const vis = sec.textContent.toLowerCase().includes(q);
    sec.style.display = vis ? 'flex' : 'none';
    sec.classList.toggle('on', vis);
  });
}

function toggleVF() {
  const cat = document.getElementById('aCat').value;
  document.getElementById('aVF').style.display = (cat === 'Verbs' || cat === 'Phrasal Verbs') ? 'grid' : 'none';
}
function swAddTab(t) {
  document.querySelectorAll('.add-tab').forEach(b => b.classList.toggle('on', b.dataset.at === t));
  document.getElementById('afs').classList.toggle('on', t === 's');
  document.getElementById('afb').classList.toggle('on', t === 'b');
}
function wExists(w) { return ALL.some(c => c.word.toLowerCase().trim() === w.toLowerCase().trim()); }
function gv(id) { return document.getElementById(id).value.trim(); }
function addSingle() {
  const word = gv('aWd'), tr = gv('aTr'), cat = document.getElementById('aCat').value;
  const sm = document.getElementById('aSm');
  if (!word || !tr) { sm.textContent = 'Fill word and translation'; sm.className = 'asm asm-err'; return; }
  if (wExists(word)) { sm.textContent = `"${word}" already in list!`; sm.className = 'asm asm-dup'; return; }
  ALL.push({ cat, word, tr, ph: gv('aPh'), v2: gv('aV2'), v3: gv('aV3'), ex: gv('aEx'), exr: '', _custom: true });
  saveCustom(); buildVCats(); renderVocab();
  sm.textContent = '✓ "' + word + '" added!'; sm.className = 'asm asm-ok';
  ['aWd', 'aTr', 'aPh', 'aV2', 'aV3', 'aEx'].forEach(id => document.getElementById(id).value = '');
}
function addBulk() {
  const text = document.getElementById('bkta').value.trim();
  const cat = document.getElementById('bCat').value;
  const res = document.getElementById('bkr');
  if (!text) { res.textContent = 'Enter some words'; return; }
  let added = 0, dups = 0, errs = 0;
  text.split('\n').forEach(line => {
    line = line.trim(); if (!line) return;
    const p = line.split('—').map(s => s.trim());
    if (p.length < 2) { errs++; return; }
    const [word, tr, v2 = '', v3 = ''] = p;
    if (!word || !tr) { errs++; return; }
    if (wExists(word)) { dups++; return; }
    ALL.push({ cat, word, tr, ph: '', v2, v3, ex: '', exr: '', _custom: true });
    added++;
  });
  saveCustom(); buildVCats(); renderVocab();
  let msg = '';
  if (added) msg += '✓ Added: ' + added + '. ';
  if (dups) msg += 'Already exists: ' + dups + '. ';
  if (errs) msg += 'Format errors: ' + errs + '.';
  res.textContent = msg; res.className = 'bkr ' + (added ? 'bkr-ok' : 'bkr-dup');
  if (added) document.getElementById('bkta').value = '';
}
function saveCustom() { try { localStorage.setItem('vd5_words', JSON.stringify(ALL.filter(c => c._custom))); } catch (e) { } }
function saveScores() { try { localStorage.setItem('vd5_scores', JSON.stringify(scores)); } catch (e) { } }
function loadCustom() {
  try { const s = localStorage.getItem('vd5_words'); if (s) JSON.parse(s).forEach(c => { c._custom = true; if (!wExists(c.word)) ALL.push(c); }); } catch (e) { }
  try { const s = localStorage.getItem('vd5_scores'); if (s) { const saved = JSON.parse(s); Object.assign(scores, saved); } } catch (e) { }
}

// ══════════════════════════════════════════════
//  NAV & OVERLAYS
// ══════════════════════════════════════════════
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    document.querySelectorAll('.pg').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
    document.getElementById('pg-' + t.dataset.page).classList.add('on');
  };
});
function openOv(id) { document.getElementById(id).classList.add('on'); }
function closeOv(id) { document.getElementById(id).classList.remove('on'); }
function closeOvIf(e, id) { if (e.target === document.getElementById(id)) closeOv(id); }

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function esc2(s) { return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

//  BOOT
// ══════════════════════════════════════════════
init();
</script>
